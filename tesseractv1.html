<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX v110.12 // TESSERACT ENGINE</title>
    <style>
        :root {
            --bg-dark: #050505; --panel-bg: #0a0a0a; --border-color: #1f1f1f;
            --accent-cyan: #00e5ff; --accent-green: #00e676; --accent-yellow: #ffea00;
            --accent-purple: #b388ff; --accent-orange: #ff9100;
            --font-mono: 'Courier New', monospace;
        }
        body { background: var(--bg-dark); color: #e0e0e0; font-family: var(--font-mono); margin: 0; overflow: hidden; display: grid; grid-template-rows: 60px 1fr; height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border-color); background: #000; z-index: 10; }
        main { display: grid; grid-template-columns: 320px 1fr 320px; gap: 10px; padding: 10px; height: calc(100vh - 60px); box-sizing: border-box; }
        
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .section-title { color: var(--accent-cyan); font-size: 0.75em; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 5px; letter-spacing: 1px;}
        
        #canvas-container { flex-grow: 1; width: 100%; height: 100%; position: relative; overflow: hidden; background: radial-gradient(circle, #0a0a0a 0%, #000 100%); border: 1px solid #111; }
        #tesseractCanvas { width: 100%; height: 100%; display: block; }
        
        .control-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
        .control-group label { font-size: 0.7em; color: #888; display: flex; justify-content: space-between;}
        .val-display { color: var(--accent-yellow); font-weight: bold; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: #111; height: 4px; border-radius: 2px; outline: none; margin-top: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent-cyan); cursor: pointer; }
        
        .checkbox-group { display: flex; align-items: center; gap: 8px; font-size: 0.75em; cursor: pointer; color: #ddd; margin-top: 5px;}
        .checkbox-group input { cursor: pointer; accent-color: var(--accent-cyan); }

        #hud-overlay { position: absolute; top: 15px; left: 15px; pointer-events: none; }
        .hud-title { font-size: 0.6em; letter-spacing: 2px; color: #555; }
        .hud-value { font-size: 1.2em; font-weight: bold; color: var(--accent-green); text-shadow: 0 0 10px rgba(0, 230, 118, 0.3); }

        .btn-reset { background: transparent; color: var(--accent-orange); border: 1px solid var(--accent-orange); padding: 8px; font-family: var(--font-mono); cursor: pointer; font-size: 0.7em; transition: 0.2s; width: 100%; text-transform: uppercase; font-weight: bold; margin-top: 10px;}
        .btn-reset:hover { background: rgba(255, 145, 0, 0.1); }

        @media (max-width: 1024px) {
            body { display: block; overflow-y: auto; }
            main { display: flex; flex-direction: column; height: auto; }
            #canvas-container { height: 60vh; }
            header { flex-direction: column; height: auto; padding: 10px; gap: 8px; }
        }
    </style>
</head>
<body>
    <header>
        <div style="color: var(--accent-cyan); font-weight: bold; font-size: 1.1em;">VORTEX v110.12 // TESSERACT ENGINE</div>
        <div id="sys-clock" style="color: var(--accent-yellow);">SYNCING...</div>
    </header>
    <main>
        <div class="panel">
            <div class="section-title">4D HYPER-ROTATIE MATRICES</div>
            
            <div class="control-group">
                <label><span>XW Axis (Binnenstebuiten)</span> <span id="val-xw" class="val-display">0°</span></label>
                <input type="range" id="rot-xw" min="0" max="360" value="0">
            </div>
            <div class="control-group">
                <label><span>YW Axis (Vouwen)</span> <span id="val-yw" class="val-display">0°</span></label>
                <input type="range" id="rot-yw" min="0" max="360" value="0">
            </div>
            <div class="control-group">
                <label><span>ZW Axis (Inversie)</span> <span id="val-zw" class="val-display">0°</span></label>
                <input type="range" id="rot-zw" min="0" max="360" value="0">
            </div>

            <label class="checkbox-group">
                <input type="checkbox" id="auto-rotate" checked>
                <span>AUTOMATISCHE 4D ROTATIE</span>
            </label>
        </div>

        <div class="panel" style="padding:0;">
            <div id="canvas-container">
                <canvas id="tesseractCanvas"></canvas>
                <div id="hud-overlay">
                    <div class="hud-title">GEOMETRIE STATUS</div>
                    <div class="hud-value">4D HYPERKUBUS</div>
                    <div style="font-size: 0.65em; color: #888; margin-top: 5px;">
                        Knooppunten: 16<br>
                        Ribben: 32<br>
                        Dimensies: X, Y, Z, W
                    </div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="section-title">3D RUIMTELIJKE PROJECTIE</div>
            
            <div class="control-group">
                <label><span>XY Axis (Roll)</span> <span id="val-xy" class="val-display">0°</span></label>
                <input type="range" id="rot-xy" min="0" max="360" value="45">
            </div>
            <div class="control-group">
                <label><span>XZ Axis (Yaw)</span> <span id="val-xz" class="val-display">0°</span></label>
                <input type="range" id="rot-xz" min="0" max="360" value="45">
            </div>
            <div class="control-group">
                <label><span>YZ Axis (Pitch)</span> <span id="val-yz" class="val-display">0°</span></label>
                <input type="range" id="rot-yz" min="0" max="360" value="0">
            </div>
            <div class="control-group">
                <label><span>Zoom Matrix</span></label>
                <input type="range" id="cam-zoom" min="50" max="250" value="120">
            </div>

            <div class="section-title" style="margin-top: 15px;">WEERGAVE OPTIES</div>
            <label class="checkbox-group">
                <input type="checkbox" id="show-nodes" checked>
                <span style="color: var(--accent-cyan);">TOON 16 KNOOPPUNTEN (NODES)</span>
            </label>

            <button id="btn-reset" class="btn-reset">RESET MATRIX</button>
            
            <div id="terminal" style="font-size: 0.6em; color: var(--accent-green); height: 80px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px;">
                > VORTEX TESSERACT ENGINE INITIATED...<br>
                > W-AXIS PROJECTION ONLINE...<br>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('tesseractCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        // Geometrie van de Tesseract genereren (16 vertices, 32 edges)
        let vertices = [];
        for (let i = 0; i < 16; i++) {
            let x = (i & 1) === 0 ? -1 : 1;
            let y = (i & 2) === 0 ? -1 : 1;
            let z = (i & 4) === 0 ? -1 : 1;
            let w = (i & 8) === 0 ? -1 : 1;
            vertices.push([x, y, z, w]);
        }

        let edges = [];
        for (let i = 0; i < 16; i++) {
            for (let j = i + 1; j < 16; j++) {
                // Ribben verbinden hoekpunten die op precies 1 as verschillen
                let diffCount = 0;
                for (let k = 0; k < 4; k++) {
                    if (vertices[i][k] !== vertices[j][k]) diffCount++;
                }
                if (diffCount === 1) edges.push([i, j]);
            }
        }

        let state = {
            angle: { xy: 45, xz: 45, yz: 0, xw: 0, yw: 0, zw: 0 },
            zoom: 120,
            autoRotate: true,
            showNodes: true
        };

        // UI Elementen koppelen
        const els = {
            xw: document.getElementById('rot-xw'), val_xw: document.getElementById('val-xw'),
            yw: document.getElementById('rot-yw'), val_yw: document.getElementById('val-yw'),
            zw: document.getElementById('rot-zw'), val_zw: document.getElementById('val-zw'),
            xy: document.getElementById('rot-xy'), val_xy: document.getElementById('val-xy'),
            xz: document.getElementById('rot-xz'), val_xz: document.getElementById('val-xz'),
            yz: document.getElementById('rot-yz'), val_yz: document.getElementById('val-yz'),
            zoom: document.getElementById('cam-zoom'),
            auto: document.getElementById('auto-rotate'),
            nodes: document.getElementById('show-nodes')
        };

        // Event Listeners voor sliders
        ['xw', 'yw', 'zw', 'xy', 'xz', 'yz'].forEach(axis => {
            els[axis].addEventListener('input', (e) => {
                state.angle[axis] = parseFloat(e.target.value);
                els['val_' + axis].innerText = Math.floor(state.angle[axis]) + "°";
                if(state.autoRotate && ['xw','yw','zw'].includes(axis)) {
                    state.autoRotate = false;
                    els.auto.checked = false;
                    logTerminal("Automatische rotatie onderbroken door handmatige override.");
                }
            });
        });

        els.zoom.addEventListener('input', e => state.zoom = parseFloat(e.target.value));
        els.auto.addEventListener('change', e => {
            state.autoRotate = e.target.checked;
            logTerminal(state.autoRotate ? "Auto-rotatie geactiveerd." : "Auto-rotatie gedeactiveerd.");
        });
        els.nodes.addEventListener('change', e => state.showNodes = e.target.checked);
        
        document.getElementById('btn-reset').addEventListener('click', () => {
            ['xw', 'yw', 'zw', 'yz'].forEach(axis => { state.angle[axis] = 0; els[axis].value = 0; els['val_'+axis].innerText = "0°"; });
            ['xy', 'xz'].forEach(axis => { state.angle[axis] = 45; els[axis].value = 45; els['val_'+axis].innerText = "45°"; });
            state.zoom = 120; els.zoom.value = 120;
            logTerminal("Matrix gereset naar standaard waarden.");
        });

        function logTerminal(msg) {
            const t = document.getElementById('terminal');
            t.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}<br>` + t.innerHTML;
        }

        // Matrix rotatie functie (Werkt voor 2 assen tegelijk in 4D)
        function rotate(v, axis1, axis2, angleDeg) {
            let angleRad = angleDeg * (Math.PI / 180);
            let cos = Math.cos(angleRad);
            let sin = Math.sin(angleRad);
            let result = [...v];
            result[axis1] = v[axis1] * cos - v[axis2] * sin;
            result[axis2] = v[axis1] * sin + v[axis2] * cos;
            return result;
        }

        function draw() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (state.autoRotate) {
                state.angle.xw = (state.angle.xw + 0.3) % 360;
                state.angle.yw = (state.angle.yw + 0.2) % 360;
                state.angle.zw = (state.angle.zw + 0.1) % 360;
                
                els.xw.value = state.angle.xw; els.val_xw.innerText = Math.floor(state.angle.xw) + "°";
                els.yw.value = state.angle.yw; els.val_yw.innerText = Math.floor(state.angle.yw) + "°";
                els.zw.value = state.angle.zw; els.val_zw.innerText = Math.floor(state.angle.zw) + "°";
            }

            let projected3D = [];

            // Projecteer elke 4D vertex naar 3D
            for (let i = 0; i < vertices.length; i++) {
                let v = vertices[i];

                // Pas 4D rotaties toe (X=0, Y=1, Z=2, W=3)
                v = rotate(v, 0, 3, state.angle.xw); // XW
                v = rotate(v, 1, 3, state.angle.yw); // YW
                v = rotate(v, 2, 3, state.angle.zw); // ZW

                // Pas 3D rotaties toe
                v = rotate(v, 0, 1, state.angle.xy); // XY
                v = rotate(v, 0, 2, state.angle.xz); // XZ
                v = rotate(v, 1, 2, state.angle.yz); // YZ

                // Perspectief projectie: 4D -> 3D
                let w = v[3];
                let w_distance = 2.5; 
                let w_factor = 1 / (w_distance - w); // Hoe dichter w bij w_distance, hoe groter (perspectief)
                
                let x3 = v[0] * w_factor;
                let y3 = v[1] * w_factor;
                let z3 = v[2] * w_factor;

                // Perspectief projectie: 3D -> 2D
                let z_distance = 3.0;
                let z_factor = 1 / (z_distance - z3);
                
                let x2 = x3 * z_factor * state.zoom;
                let y2 = y3 * z_factor * state.zoom;

                projected3D.push({ x: x2, y: y2, w: w, z3: z3 });
            }

            // Teken de Ribben (Edges)
            ctx.lineWidth = 2;
            for (let i = 0; i < edges.length; i++) {
                let p1 = projected3D[edges[i][0]];
                let p2 = projected3D[edges[i][1]];

                // Lijnen kleuren op basis van hun w-coördinaat voor een 4D diepte-effect
                let avgW = (p1.w + p2.w) / 2;
                // Vertaal w (-1 tot 1) naar een kleur: Cyan voor 'dichtbij' (w=-1), Purple voor 'ver' (w=1)
                let r = Math.floor((avgW + 1) * 100); 
                let g = Math.floor(200 - (avgW + 1) * 80);
                let b = 255;
                let alpha = 0.4 + (1 - (avgW+1)/2) * 0.6; // Maak dingen op de achtergrond transparanter

                ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                
                ctx.beginPath();
                ctx.moveTo(cx + p1.x, cy + p1.y);
                ctx.lineTo(cx + p2.x, cy + p2.y);
                ctx.stroke();
            }

            // Teken de Knooppunten (Nodes)
            if (state.showNodes) {
                ctx.shadowBlur = 15;
                for (let i = 0; i < projected3D.length; i++) {
                    let p = projected3D[i];
                    
                    // Grootte afhankelijk van perspectief (z3)
                    let size = Math.max(1, (1 + p.z3) * 3);
                    
                    // Kleur afhankelijk van w-positie
                    let isInner = p.w > 0;
                    ctx.fillStyle = isInner ? "var(--accent-purple)" : "var(--accent-cyan)";
                    ctx.shadowColor = ctx.fillStyle;

                    ctx.beginPath();
                    ctx.arc(cx + p.x, cy + p.y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            requestAnimationFrame(draw);
        }

        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        draw();
    </script>
</body>
</html>
