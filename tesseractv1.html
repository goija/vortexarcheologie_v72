<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX v110.14 // NEON-SYNC LIVE</title>
    <style>
        :root {
            --bg-dark: #050505; --panel-bg: #0a0a0a; --border-color: #1f1f1f;
            --accent-cyan: #00e5ff; --accent-green: #00e676; --accent-yellow: #ffea00; /* Neon Geel */
            --accent-red: #ff3d00; --accent-orange: #ff9100; --accent-purple: #e1b1ff; /* Lila */
            --font-mono: 'Courier New', monospace;
        }
        body { background: var(--bg-dark); color: #e0e0e0; font-family: var(--font-mono); margin: 0; overflow: hidden; display: grid; grid-template-rows: 60px 1fr; height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border-color); background: #000; z-index: 10; }
        main { display: grid; grid-template-columns: 320px 1fr 320px; gap: 10px; padding: 10px; height: calc(100vh - 60px); box-sizing: border-box; }
        
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 12px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .section-title { color: var(--accent-cyan); font-size: 0.7em; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 3px; }
        
        #canvas-container { flex-grow: 1; width: 100%; height: 100%; position: relative; cursor: crosshair; overflow: hidden; background: #000; border: 1px solid #111; }
        #cosmicCanvas { width: 100%; height: 100%; display: block; }
        
        .mobile-nav { position: absolute; right: 15px; bottom: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .m-btn { width: 60px; height: 60px; background: rgba(0,0,0,0.8); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); font-size: 28px; display: flex; align-items: center; justify-content: center; border-radius: 10px; touch-action: manipulation; }

        button { background: transparent; color: var(--accent-cyan); border: 1px solid var(--accent-cyan); padding: 8px; font-family: var(--font-mono); cursor: pointer; font-size: 0.65em; transition: 0.2s; text-transform: uppercase; font-weight: bold; }
        button.active { background: var(--accent-yellow); color: #000; border-color: var(--accent-yellow); }
        
        select, input[type="range"] { background: #111; color: var(--accent-cyan); border: 1px solid #333; padding: 5px; font-family: var(--font-mono); font-size: 0.7em; width: 100%; outline: none;}
        .data-row { display: flex; justify-content: space-between; font-size: 0.75em; border-bottom: 1px solid #1a1a1a; padding: 2px 0; }
        
        @media (max-width: 1024px) {
            body { display: block; overflow-y: auto; }
            main { display: flex; flex-direction: column; height: auto; }
            #canvas-container { height: 70vh; }
            header { flex-direction: column; height: auto; padding: 10px; gap: 8px; }
        }
    </style>
</head>
<body>
    <header>
        <div style="color: var(--accent-cyan); font-weight: bold;">VORTEX v110.14 // NEON-MATRIX</div>
        <div id="sys-clock" style="color: var(--accent-yellow);">00:00:00</div>
        <div style="display: flex; gap: 8px;">
            <button id="btn-audio">AUDIO</button>
            <button id="btn-record" style="border-color:var(--accent-red); color:var(--accent-red);">⏺ OPNAME</button>
            <button id="btn-luna" style="border-color:#fff; color:#fff;">☾ MAAN FOCUS</button>
        </div>
    </header>
    <main>
        <div class="panel">
            <div class="section-title">GEOMETRIE & 4D NODES</div>
            <label style="font-size: 0.6em; color: #888;">TESSELATIE KLEUR: <span style="color:var(--accent-yellow)">NEON GEEL</span></label>
            <select id="tiling-type">
                <option value="hexagons">HEXAGONEN (CELLAIR)</option>
                <option value="triangles">DRIEHOEKEN (VECTORS)</option>
                <option value="diamonds">RUITEN (CRYSTAL)</option>
            </select>
            
            <label style="font-size: 0.6em; color: #888; margin-top: 10px;">TESSERACT NODES: <span style="color:var(--accent-purple)">LILA</span></label>
            <div id="sonar-freq" style="font-size: 1.2em; color: var(--accent-green); margin-top: 5px;">1320.00 Hz</div>
            
            <div class="section-title" style="margin-top: 15px;">LIVE EPHEMERIS</div>
            <div class="data-row"><span>ZON:</span><span id="d-sun" style="color:var(--accent-yellow)">--° / --°</span></div>
            <div class="data-row"><span>MAAN:</span><span id="d-moon" style="color:#fff">--° / --°</span></div>
            <div class="data-row"><span>FASE:</span><span id="l-ph" style="color:#aaa;">--%</span></div>
        </div>

        <div class="panel" style="padding:0;">
            <div id="canvas-container">
                <canvas id="cosmicCanvas"></canvas>
                <div class="mobile-nav">
                    <button class="m-btn" id="m-in">+</button>
                    <button class="m-btn" id="m-out">−</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="section-title">TRANSFORMATIES</div>
            <button id="btn-mirror" style="width: 100%;">MIRROR X-AS</button>
            <button id="btn-polar" style="width: 100%;">POLAR INVERSIE</button>
            <button id="btn-reset" style="width: 100%; border-color:#555; color:#888;">RESET VIEW</button>
            <div id="terminal" style="font-size: 0.6em; color: var(--accent-green); height: 100px; overflow-y: auto; margin-top: 20px;">
                > VORTEX 110.14 ONLINE...<br>
                > TESSERACT NODES: LILA.<br>
                > TILING: NEON GEEL.
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('cosmicCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        
        const tessVertices = [];
        for (let i = 0; i < 16; i++) {
            tessVertices.push([(i & 1) === 0 ? -1 : 1, (i & 2) === 0 ? -1 : 1, (i & 4) === 0 ? -1 : 1, (i & 8) === 0 ? -1 : 1]);
        }

        let state = {
            cam: { rotX: 0.6, rotY: 0, zoom: 1.1 },
            stars: [],
            astro: { sun: { az: 109.84, el: 22.68 }, moon: { az: 240.62, el: -10.57 } },
            mods: { mirror: false, polar: false },
            tiling: { type: 'hexagons' },
            tesseract: { xw: 0, yw: 0, zw: 0 },
            luna: { active: false },
            audio: { active: false, ctx: null, osc: null }
        };

        for(let i=0; i<600; i++) state.stars.push({x:Math.random()*4-2, y:Math.random()*4-2, z:Math.random()*4-2});

        function project(x, y, z) {
            let mX = state.mods.mirror ? -1 : 1, mP = state.mods.polar ? -1 : 1;
            let nx = (x * mX) * Math.cos(state.cam.rotY) - (z * mP) * Math.sin(state.cam.rotY);
            let nz = (x * mX) * Math.sin(state.cam.rotY) + (z * mP) * Math.cos(state.cam.rotY);
            let ny = (y * mP) * Math.cos(state.cam.rotX) - nz * Math.sin(state.cam.rotX);
            const scale = Math.min(canvas.width, canvas.height) * 0.5 * state.cam.zoom;
            return { x: nx * scale, y: ny * scale, z: nz };
        }

        function drawTiling(cx, cy) {
            const d = 3;
            ctx.strokeStyle = "rgba(255, 234, 0, 0.6)"; // Neon Geel
            ctx.lineWidth = 1.5;

            for (let q = -d; q <= d; q++) {
                for (let r = -d; r <= d; r++) {
                    if (Math.abs(q + r) > d) continue;
                    let x = 0.22 * (Math.sqrt(3) * q + Math.sqrt(3)/2 * r) / d;
                    let z = 0.22 * (3/2 * r) / d;
                    let p = project(x, 0, z);
                    
                    if (state.tiling.type === 'hexagons') {
                        ctx.beginPath();
                        for(let i=0; i<6; i++) {
                            let a = i * Math.PI / 3;
                            let v = project(x + Math.sin(a)*0.1/d, 0, z + Math.cos(a)*0.1/d);
                            if(i===0) ctx.moveTo(cx+v.x, cy+v.y); else ctx.lineTo(cx+v.x, cy+v.y);
                        }
                        ctx.closePath(); ctx.stroke();
                    } else if (state.tiling.type === 'triangles') {
                        let pR = project(x + 0.12/d, 0, z);
                        ctx.beginPath(); ctx.moveTo(cx+p.x, cy+p.y); ctx.lineTo(cx+pR.x, cy+pR.y); ctx.stroke();
                    }
                }
            }
        }

        function drawTesseract(cx, cy) {
            state.tesseract.xw += 0.006;
            state.tesseract.yw += 0.009;

            tessVertices.forEach((v) => {
                let x = v[0], y = v[1], z = v[2], w = v[3];
                let cosXW = Math.cos(state.tesseract.xw), sinXW = Math.sin(state.tesseract.xw);
                let nx = x * cosXW - w * sinXW; let nw = x * sinXW + w * cosXW;
                x = nx; w = nw;
                
                let w_factor = 1 / (2.5 - w);
                let p2 = project(x * w_factor * 0.45, y * w_factor * 0.45, z * w_factor * 0.45);
                
                ctx.fillStyle = "#e1b1ff"; // Lila
                ctx.shadowBlur = 12; ctx.shadowColor = "#e1b1ff";
                ctx.beginPath(); ctx.arc(cx + p2.x, cy + p2.y, 4 * state.cam.zoom, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function draw() {
            canvas.width = container.clientWidth; canvas.height = container.clientHeight;
            const cx = canvas.width/2, cy = canvas.height/2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Stars
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            state.stars.forEach(s => { let p = project(s.x, s.y, s.z); ctx.fillRect(cx + p.x, cy + p.y, 1, 1); });

            // Neon Tiling & Tesseract Nodes
            drawTiling(cx, cy);
            drawTesseract(cx, cy);

            // Sun & Moon
            let sP = project(Math.sin(state.astro.sun.az*Math.PI/180), 0.1, Math.cos(state.astro.sun.az*Math.PI/180));
            ctx.fillStyle = "var(--accent-yellow)"; ctx.beginPath(); ctx.arc(cx+sP.x, cy+sP.y, 10, 0, Math.PI*2); ctx.fill();
            
            let mP = project(Math.sin(state.astro.moon.az*Math.PI/180), -0.1, Math.cos(state.astro.moon.az*Math.PI/180));
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(cx+mP.x, cy+mP.y, 7, 0, Math.PI*2); ctx.fill();

            requestAnimationFrame(draw);
        }

        document.getElementById('tiling-type').onchange = (e) => state.tiling.type = e.target.value;
        document.getElementById('btn-mirror').onclick = function() { state.mods.mirror = !state.mods.mirror; this.classList.toggle('active'); };
        document.getElementById('btn-polar').onclick = function() { state.mods.polar = !state.mods.polar; this.classList.toggle('active'); };
        document.getElementById('btn-reset').onclick = () => state.cam = { rotX: 0.6, rotY: 0, zoom: 1.1 };
        
        let drag = false, lx, ly;
        container.onmousedown = container.ontouchstart = (e) => { drag = true; let t = e.touches?e.touches[0]:e; lx = t.clientX; ly = t.clientY; };
        window.onmousemove = window.ontouchmove = (e) => { if(!drag) return; let t = e.touches?e.touches[0]:e; state.cam.rotY += (t.clientX - lx)*0.008; state.cam.rotX += (t.clientY - ly)*0.008; lx = t.clientX; ly = t.clientY; };
        window.onmouseup = window.ontouchend = () => drag = false;

        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        draw();
    </script>
</body>
</html>
