<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX MATRIX GATEWAY // DUAL-DOMAIN ROUTER</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --fc-100-black: #050508;                      
            --laser-cyan: #00e5ff;                  
            --lithos-amber: #ffb000;                     
            --matrix-green: #00ff41;                      
            --alert-red: #d92534;
            --panel-bg: rgba(10, 15, 20, 0.9); 
            --border-dim: #334;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; }
        body, html { 
            background-color: var(--fc-100-black); 
            color: #e0e0e0; 
            font-family: var(--font-mono); 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            display: flex; flex-direction: column; 
        }
        
        header { 
            flex: 0 0 60px; background: #000; border-bottom: 2px solid var(--laser-cyan); 
            padding: 0 20px; display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); 
        }
        .title { color: var(--laser-cyan); font-size: 1.5em; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 10px var(--laser-cyan); }
        .status { color: var(--matrix-green); font-size: 0.8em; letter-spacing: 2px; text-align: right; }
        
        .main-grid { 
            display: grid; 
            grid-template-columns: 350px 1fr 350px; 
            grid-template-rows: 1fr 200px; 
            width: 100%; height: calc(100vh - 60px); 
        }
        
        .panel { background: var(--panel-bg); border-right: 1px solid var(--border-dim); border-bottom: 1px solid var(--border-dim); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        .panel-header { color: var(--lithos-amber); font-size: 0.9em; font-weight: bold; border-bottom: 1px solid var(--lithos-amber); padding-bottom: 5px; letter-spacing: 2px; text-transform: uppercase; }

        /* Gateway & P2P Lists */
        .gateway-item { background: #000; border: 1px solid #444; padding: 10px; border-left: 4px solid #444; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .gateway-item.active { border-left-color: var(--matrix-green); border-color: #004400; background: rgba(0, 20, 0, 0.8); }
        .gateway-info { display: flex; flex-direction: column; }
        .gw-name { font-weight: bold; font-size: 0.85em; color: #fff; }
        .gw-status { font-size: 0.7em; color: #888; }
        .active .gw-status { color: var(--matrix-green); }
        .btn-connect { background: #111; color: var(--laser-cyan); border: 1px solid var(--laser-cyan); padding: 8px 10px; cursor: pointer; font-size: 0.7em; font-weight: bold; transition: 0.2s;}
        .btn-connect:hover { background: var(--laser-cyan); color: #000; }
        
        .btn-p2p { background: #002200; color: var(--matrix-green); border: 1px solid var(--matrix-green); width: 100%; padding: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-p2p:hover { background: var(--matrix-green); color: #000; box-shadow: 0 0 15px var(--matrix-green); }

        /* Custom API Builder */
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .input-group label { font-size: 0.7em; color: var(--laser-cyan); }
        .input-group input, .input-group select { background: #000; border: 1px solid #555; color: var(--matrix-green); padding: 10px; font-family: inherit; font-size: 0.8em; outline: none; }
        .input-group input:focus { border-color: var(--matrix-green); }
        .input-group input[readonly] { color: var(--lithos-amber); border-color: #443300; background: #0a0800; }

        /* Dual Maps Container */
        .maps-container { display: flex; flex-direction: column; grid-column: 2 / 3; grid-row: 1 / 2; }
        #trackerMap { flex: 1; background: #000; border-bottom: 2px solid var(--laser-cyan); z-index: 1; min-height: 250px; }
        #astroMap { flex: 1; background: radial-gradient(circle at center, #050510 0%, #000 100%); position: relative; min-height: 200px; }
        canvas { width: 100%; height: 100%; display: block; }
        .map-label { position: absolute; top: 10px; left: 10px; z-index: 400; background: rgba(0,0,0,0.8); padding: 5px 10px; border: 1px solid var(--lithos-amber); font-size: 0.7em; color: var(--lithos-amber); pointer-events: none; }

        /* Terminal */
        .terminal { grid-column: 1 / 4; grid-row: 2 / 3; background: #020202; border-top: 2px solid var(--border-dim); padding: 10px; font-size: 0.75em; color: #aaa; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .log-time { color: #555; margin-right: 10px; }
        .log-sys { color: var(--laser-cyan); }
        .log-data { color: var(--lithos-amber); }
        .log-success { color: var(--matrix-green); }
        .log-warn { color: var(--alert-red); font-weight: bold; }
        
        /* Blinking Markers */
        .beacon-marker { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--matrix-green); background: rgba(0, 255, 65, 0.2); animation: ping 1.5s infinite; }
        .lora-marker { border-color: var(--laser-cyan); background: rgba(0, 229, 255, 0.2); animation: ping 2s infinite; }
        .peer-marker { border-color: #ff00ff; background: rgba(255, 0, 255, 0.2); animation: ping 1s infinite; }
        @keyframes ping { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        /* Leaflet Customizations */
        .leaflet-control-layers { background: rgba(0, 0, 0, 0.9) !important; color: var(--matrix-green) !important; border: 1px solid var(--laser-cyan) !important; font-family: var(--font-mono); }
        .leaflet-control-layers-toggle { filter: invert(1) hue-rotate(180deg); }

        /* Mobile Responsiveness */
        @media screen and (max-width: 950px) {
            body, html { height: auto; overflow-y: auto; overflow-x: hidden; }
            header { flex-direction: column; height: auto; padding: 15px; gap: 5px; text-align: center; }
            .main-grid { display: flex; flex-direction: column; height: auto; }
            .panel { border-right: none; border-bottom: 2px solid var(--border-dim); max-height: none; }
            .maps-container { height: 70vh; border-bottom: 2px solid var(--border-dim); }
            #trackerMap { flex: 1.5; } 
            #astroMap { flex: 1; }
            .terminal { height: 35vh; border-top: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="title">MATRIX GATEWAY // ROUTER C2</div>
    <div class="status" id="headerStatus">STATUS: OMNI-BRIDGE STANDBY</div>
</header>

<div class="main-grid">
    <div class="panel">
        
        <div class="panel-header">OMNI-BRIDGE P2P LINK</div>
        <div class="input-group">
            <label>LOKAAL ID (ROUTER)</label>
            <input type="text" id="localId" readonly>
        </div>
        <div class="input-group">
            <label>ONTVANGER ID (TARGET NODE)</label>
            <input type="text" id="targetId" placeholder="Bijv. VTX-A1B2C">
        </div>
        <button class="btn-p2p" onclick="connectToPeer()">INITIEER P2P LINK</button>

        <div class="panel-header" style="margin-top: 20px;">INSTITUTIONAL UPLINKS</div>
        <div id="gateway-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>

    <div class="maps-container">
        <div id="trackerMap">
            <div class="map-label">GEO-LAYER (LAREN / NL)</div>
        </div>
        <div id="astroMap">
            <div class="map-label" style="border-color:var(--laser-cyan); color:var(--laser-cyan);">ASTRO-LAYER (FREQUENTIE VELD)</div>
            <canvas id="astroCanvas"></canvas>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">CUSTOM API / LORA BUILDER</div>
        
        <div class="input-group">
            <label>GATEWAY NAAM</label>
            <input type="text" id="apiName" placeholder="Bijv. Archeo_Node_Alpha">
        </div>
        <div class="input-group">
            <label>PROTOCOL / TYPE</label>
            <select id="apiType">
                <option value="LoRaWAN">LoRaWAN (Field Sensor)</option>
                <option value="WSS">WebSocket Secure (WSS)</option>
                <option value="REST">REST API (JSON)</option>
                <option value="MQTT">MQTT Broker</option>
            </select>
        </div>
        <div class="input-group">
            <label>ENDPOINT / EUI</label>
            <input type="text" id="apiEndpoint" placeholder="wss://... of DevEUI">
        </div>
        <div class="input-group">
            <label>COÖRDINATEN (Lat, Lon)</label>
            <input type="text" id="apiCoords" value="52.257, 5.214">
        </div>
        <div class="input-group">
            <label>AKOESTISCHE VINGERAFDRUK (kHz)</label>
            <input type="number" id="apiFreq" value="18.5" step="0.1">
        </div>
        
        <button class="btn-p2p" style="background:#111; color:var(--laser-cyan); border-color:var(--laser-cyan);" onclick="buildCustomGateway()">GENEREER BAKEN</button>
    </div>

    <div class="terminal" id="terminal">
        <div><span class="log-time">[INIT]</span><span class="log-sys">VORTEX Dual-Domain Gateway v1.3 (Target-ID geactiveerd).</span></div>
        <div><span class="log-time">[INIT]</span><span class="log-sys">Genereren van asymmetrische WebRTC sleutels...</span></div>
    </div>
</div>

<script>
    // --- 0. Identiteit & Audio Engine ---
    const myID = "VTX-" + Math.random().toString(36).substr(2, 5).toUpperCase();
    document.getElementById('localId').value = myID;
    
    let audioCtx = null;
    function playAcousticPing(freq_kHz, isPeer = false) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = isPeer ? 'square' : 'sine';
        osc.frequency.setValueAtTime(freq_kHz * 1000, audioCtx.currentTime); 
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05); 
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6); 
        
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.65);
    }

    // --- 1. WebRTC & P2P Ontvanger Logica ---
    let ws, pc, dc;
    let targetID = "";
    
    function connectToPeer() {
        targetID = document.getElementById('targetId').value.trim().toUpperCase();
        if(!targetID) { logMsg("FOUT: Voer een geldige Ontvanger ID in.", "log-warn"); return; }
        
        logMsg(`[P2P] Initieer SDP Handshake met ontvanger [${targetID}]...`, "log-sys");
        
        // Simuleer een WebRTC handshake (voor de front-end beleving als er geen Node-RED is)
        setTimeout(() => {
            logMsg(`[P2P] Zoeken naar node ${targetID} via STUN (stun.l.google.com:19302)...`, "log-sys");
        }, 800);
        
        setTimeout(() => {
            logMsg(`[P2P] ICE Candidates uitgewisseld. DataChannel 'vortex_sync' geopend.`, "log-success");
            document.getElementById('headerStatus').innerText = `STATUS: P2P LINK ACTIEF [${targetID}]`;
            
            // Drop een speciale Peer-marker op de kaart nabij Laren
            const peerLat = 52.25 + (Math.random() * 0.05 - 0.025);
            const peerLon = 5.21 + (Math.random() * 0.05 - 0.025);
            dropBeacon(peerLat, peerLon, `EDGE-NODE: ${targetID}`, 'WebRTC_P2P', 18.5, true);
            
            // Voeg toe aan Astro map
            astroNodes.push({
                id: targetID, name: `PEER_${targetID}`, freq: 18.5,
                angle: (108 * Math.PI) / 180, // Deneb Vector
                dist: 90, color: '#ff00ff'
            });
            
            playAcousticPing(18.5, true); // Square wave ping
            
            // Start met het simuleren van inkomende sensordata van deze peer
            setInterval(() => {
                if(Math.random() > 0.5) {
                    const voltage = (Math.random() * 2 + 10).toFixed(2);
                    const signal = (Math.random() * 20 + 80).toFixed(1);
                    logMsg(`[${targetID} RX] Haptische feedback OK. Accu: ${voltage}V. Signaal: ${signal}dBm.`, 'log-success');
                }
            }, 6000);
            
        }, 2500);
    }

    // --- 2. Leaflet Geo-Map met Multi-Providers ---
    const darkMatter = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
    const topoMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });

    const map = L.map('trackerMap', { zoomControl: true, attributionControl: false, layers: [darkMatter] }).setView([52.15, 5.38], 9);
    
    const baseMaps = {
        "VORTEX Dark (CartoDB)": darkMatter,
        "Satelliet (Esri)": satellite,
        "Topografisch (Esri)": topoMap,
        "Standaard (OSM)": osm
    };
    L.control.layers(baseMaps, null, { collapsed: true }).addTo(map);

    // --- 3. Astro-Map (Canvas) ---
    const canvas = document.getElementById('astroCanvas');
    const ctx = canvas.getContext('2d');
    let astroNodes = [];
    let radarAngle = 0;

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function drawAstroMap() {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = 'rgba(0, 229, 255, 0.1)'; ctx.lineWidth = 1;
        for(let r = 30; r < cx; r += 40) {
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
        }

        radarAngle += 0.02;
        const rx = cx + Math.cos(radarAngle) * cx, ry = cy + Math.sin(radarAngle) * cx;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(rx, ry);
        ctx.strokeStyle = 'rgba(0, 255, 65, 0.5)'; ctx.stroke();

        astroNodes.forEach(node => {
            const nx = cx + Math.cos(node.angle) * node.dist;
            const ny = cy + Math.sin(node.angle) * node.dist;
            
            ctx.beginPath(); ctx.arc(nx, ny, 4, 0, Math.PI*2);
            ctx.fillStyle = node.color; ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = '9px Courier';
            ctx.fillText(`${node.name} [${node.freq}kHz]`, nx + 8, ny + 3);
            
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(nx, ny);
            ctx.strokeStyle = 'rgba(255, 176, 0, 0.2)'; ctx.stroke();
        });
        requestAnimationFrame(drawAstroMap);
    }
    drawAstroMap();

    // --- 4. Institutional Gateways ---
    const gateways = [
        { id: 'gw-nasa', name: 'NASA Deep Space Net', type: 'ASTRO_TELEMETRY', status: 'OFFLINE', freq: 60.0 },
        { id: 'gw-rws', name: 'Rijkswaterstaat', type: 'HYDRO_WAVE_DATA', status: 'OFFLINE', freq: 0.110 },
        { id: 'gw-lnv', name: 'Ministerie LNV', type: 'SOIL_INTEGRITY', status: 'OFFLINE', freq: 557.6 },
        { id: 'gw-cwi', name: 'CWI Amsterdam', type: 'CRYPTO_MATH_CORE', status: 'OFFLINE', freq: 34.85 }
    ];

    function renderGateways() {
        const gwListEl = document.getElementById('gateway-list');
        gwListEl.innerHTML = '';
        gateways.forEach(gw => {
            const isActive = gw.status === 'CONNECTED';
            gwListEl.innerHTML += `
                <div class="gateway-item ${isActive ? 'active' : ''}" id="${gw.id}">
                    <div class="gateway-info">
                        <span class="gw-name">${gw.name}</span>
                        <span class="gw-status">${gw.type} | ${gw.status}</span>
                    </div>
                    <button class="btn-connect" onclick="toggleGateway('${gw.id}')">
                        ${isActive ? 'DISCONNECT' : 'UPLINK'}
                    </button>
                </div>
            `;
        });
    }

    function toggleGateway(id) {
        const gw = gateways.find(g => g.id === id);
        if(gw.status === 'OFFLINE') {
            logMsg(`Initiërend handshake met ${gw.name}...`, 'log-sys');
            setTimeout(() => {
                gw.status = 'CONNECTED';
                logMsg(`[VERBONDEN] Data-stroom van ${gw.name} actief op ${gw.freq}kHz.`, 'log-success');
                playAcousticPing(gw.freq);
                renderGateways();
                simulateDataStream(gw);
                
                astroNodes.push({
                    id: gw.id, name: gw.name, freq: gw.freq,
                    angle: Math.random() * Math.PI * 2, dist: 40 + Math.random() * 80, color: '#00e5ff'
                });
            }, 800);
        } else {
            gw.status = 'OFFLINE'; logMsg(`Verbinding met ${gw.name} verbroken.`, 'log-sys');
            renderGateways(); astroNodes = astroNodes.filter(n => n.id !== gw.id);
        }
    }

    function simulateDataStream(gw) {
        if(gw.status !== 'CONNECTED') return;
        setInterval(() => {
            if(gw.status !== 'CONNECTED') return;
            if(Math.random() > 0.75) {
                let data = "";
                if(gw.id === 'gw-nasa') data = "Vega Azimuth drift: -0.002°";
                if(gw.id === 'gw-rws') data = "Waterpeil Nehalennia-zone: +1.2m NAP.";
                if(gw.id === 'gw-cwi') data = "M_52 Prime geverifieerd.";
                if(gw.id === 'gw-lnv') data = "Bodemweerstand WESTERHEIDE: 450 Ohm.";
                if(data) logMsg(`[${gw.name}] ${data}`, 'log-data');
            }
        }, 5000);
    }

    // --- 5. Terminal & Custom API ---
    function logMsg(msg, type = 'log-data') {
        const term = document.getElementById('terminal');
        const time = new Date().toISOString().split('T')[1].slice(0,-1);
        term.innerHTML += `<div><span class="log-time">[${time}]</span><span class="${type}">${msg}</span></div>`;
        term.scrollTop = term.scrollHeight;
    }

    function buildCustomGateway() {
        const name = document.getElementById('apiName').value || "Unknown_Node";
        const type = document.getElementById('apiType').value;
        const coordsStr = document.getElementById('apiCoords').value;
        const freq = parseFloat(document.getElementById('apiFreq').value) || 18.5;

        logMsg(`Compileren nieuwe ${type} baken: ${name}...`, 'log-sys');

        let lat = 52.257, lon = 5.214; 
        if(coordsStr.includes(',')) {
            const parts = coordsStr.split(',');
            lat = parseFloat(parts[0]); lon = parseFloat(parts[1]);
        }

        setTimeout(() => {
            dropBeacon(lat, lon, name, type, freq);
            astroNodes.push({ id: Date.now(), name: name, freq: freq, angle: (161.6 * Math.PI) / 180, dist: 100, color: '#00ff41' });
            playAcousticPing(freq);
            logMsg(`[SUCCES] Baken ${name} online op [${lat.toFixed(3)}, ${lon.toFixed(3)}].`, 'log-success');
        }, 800);
    }

    function dropBeacon(lat, lon, name, type, freq, isPeer = false) {
        let cssClass = 'beacon-marker';
        if(type === 'LoRaWAN') cssClass = 'lora-marker';
        if(isPeer) cssClass = 'peer-marker';

        const iconHtml = `<div class="${cssClass}"></div>`;
        const customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [20, 20], iconAnchor: [10, 10] });
        
        const marker = L.marker([lat, lon], {icon: customIcon}).addTo(map);
        marker.bindPopup(`<strong style="color:#000;">${name}</strong><br><span style="color:#666;">Type: ${type}<br>Freq: ${freq} kHz</span>`).openPopup();
        map.flyTo([lat, lon], 14, { animate: true, duration: 1.5 });
    }

    renderGateways();
</script>
</body>
</html>
