<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>VORTEX LITHOS | FIELD CALCULATOR</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --amber-earth: #ffb000;
            --alert-red: #ff3333;
            --cyan-data: #00ffff;
            --bg-dark: #050505;
            --panel-bg: rgba(15, 10, 0, 0.9);
        }
        body { background: var(--bg-dark); color: var(--amber-earth); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .calculator-frame { border: 2px solid var(--amber-earth); padding: 25px; background: var(--panel-bg); width: 850px; box-shadow: 0 0 30px rgba(255, 176, 0, 0.15); }
        h1 { text-align: center; font-size: 1.2rem; letter-spacing: 6px; border-bottom: 1px dashed var(--amber-earth); padding-bottom: 10px; color: var(--neon-green); }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        
        .input-section { border-right: 1px solid #332200; padding-right: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #cc8800; font-weight: bold; }
        input { width: 100%; background: #000; border: 1px solid var(--amber-earth); color: var(--neon-green); padding: 10px; font-family: inherit; box-sizing: border-box; }
        
        button { width: 100%; background: #000; color: var(--amber-earth); border: 2px solid var(--amber-earth); padding: 12px; cursor: pointer; font-weight: bold; letter-spacing: 2px; margin-top: 10px; transition: 0.3s; }
        button:hover { background: var(--amber-earth); color: #000; }

        .output-section { padding-left: 10px; }
        .console-screen { background: #000; border: 1px solid #332200; padding: 15px; height: 250px; overflow-y: auto; font-size: 0.85rem; line-height: 1.6; }
        
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 4px; }
        .sys-ok { color: var(--neon-green); }
        .sys-warn { color: var(--alert-red); font-weight: bold; animation: blink 1s infinite; }
        .sys-data { color: var(--cyan-data); }

        @keyframes blink { 50% { opacity: 0.5; } }
        
        .archaeo-lock { font-size: 0.7rem; text-align: center; margin-top: 15px; color: var(--alert-red); border-top: 1px solid #330000; padding-top: 10px; }
    </style>
</head>
<body>

<div class="calculator-frame">
    <h1>[ VORTEX LITHOS | BODEMRESONANTIE CALCULATOR ]</h1>
    
    <div class="grid-layout">
        <div class="input-section">
            <div class="input-group">
                <label>DRAAGGOLF FREQUENTIE (kHz)</label>
                <input type="number" id="freqInput" value="557.6" step="0.1">
            </div>
            <div class="input-group">
                <label>FADING / VORM-HOEK (°)</label>
                <input type="number" id="angleInput" value="108" step="1">
            </div>
            <div class="input-group">
                <label>FYSIEKE GRAAFDIEPTE (cm)</label>
                <input type="number" id="depthInput" value="40" step="1" max="100">
            </div>
            <div class="input-group">
                <label>VIRTUELE SCAN DIEPTE (cm)</label>
                <input type="number" id="scanDepthInput" value="250" step="10">
            </div>
            <button onclick="calculateField()">BEREKEN BODEM-VECTOR</button>
        </div>

        <div class="output-section">
            <div class="console-screen" id="consoleOutput">
                <div class="log-entry sys-data">Systeem gereed. Laren (9,9) matrix geladen.</div>
                <div class="log-entry sys-ok">Wachten op invoer...</div>
            </div>
        </div>
    </div>

    <div class="archaeo-lock">
        RESTRICTIE-PROTOCOL ACTIEF: MAXIMALE VERSTORINGSDIEPTE = 40 CM (WET OP DE ARCHEOLOGISCHE MONUMENTENZORG)
    </div>
</div>

<script>
    function logMessage(msg, type = 'sys-data') {
        const consoleEl = document.getElementById('consoleOutput');
        consoleEl.innerHTML += `<div class="log-entry ${type}">> ${msg}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function calculateField() {
        // Clear console
        document.getElementById('consoleOutput').innerHTML = '';

        const f_kHz = parseFloat(document.getElementById('freqInput').value);
        const angle = parseFloat(document.getElementById('angleInput').value);
        const physicalDepth = parseFloat(document.getElementById('depthInput').value);
        const virtualDepth = parseFloat(document.getElementById('scanDepthInput').value);

        // 1. Controleer de Archeologische Restrictie
        logMessage(`Controleer fysieke diepte parameters...`);
        if (physicalDepth > 40) {
            logMessage(`CRITICAL OVERRIDE: Fysieke graafdiepte (${physicalDepth} cm) overschrijdt de 40 cm limiet!`, 'sys-warn');
            logMessage(`ACTIE GEWEIGERD. Bescherming Urnenvelden / Grafheuvels actief. Gebruik virtuele scan.`, 'sys-warn');
            return; // Stop verdere fysieke berekeningen
        } else {
            logMessage(`Fysieke diepte (${physicalDepth} cm) is binnen wettelijke limieten.`, 'sys-ok');
        }

        // 2. Golflengte en Bodemweerstand Berekening
        // Vrije ruimte: c / f
        const c = 299792.458; // km/s
        const lambdaFree = (c / f_kHz) * 1000; // in meters
        
        // Bodem Snelheidsfactor (Velocity Factor) voor droge zandgrond (stuwwal Laren) is approx 0.5
        const velocityFactor = 0.5;
        const lambdaSoil = lambdaFree * velocityFactor;

        logMessage(`GOLFLENGTE (Lucht): ${lambdaFree.toFixed(2)} m`);
        logMessage(`GOLFLENGTE (Bodem - Zand): ${lambdaSoil.toFixed(2)} m`);

        // 3. Virtuele Scan (Akoestische / EM Penetratie)
        // Hoe dieper we scannen, hoe meer faseverschuiving we toepassen op basis van de 108 graden hoek
        const phaseShift = ((virtualDepth / 100) / lambdaSoil) * 360;
        const targetVector = (angle + phaseShift) % 360;

        logMessage(`INITIEER VIRTUELE SCAN: ${virtualDepth} cm diep...`);
        
        if (angle === 108) {
            logMessage(`DENEB VECTOR (108°) GEDETECTEERD. Synchronisatie actief.`, 'sys-ok');
        }

        logMessage(`Berekende Fase-Verschuiving: ${phaseShift.toFixed(2)}°`);
        logMessage(`Resulterende Scan Vector: ${targetVector.toFixed(2)}°`, 'sys-ok');
        
        // 4. Coxeter D4 Mapping Info
        logMessage(`PROJECTIE OP RASTER: (9,9) -> Matrix D4 geactiveerd. Weergave is virtueel, bodem blijft onverstoord.`, 'sys-data');
    }
</script>

</body>
</html>
